name: Veille tech quotidienne

# 06:00 UTC = 08:00 Europe/Paris (CEST). Ajuste si besoin.
on:
  schedule:
    - cron: "0 6 * * 1-5" # lundi → vendredi
  workflow_dispatch: {} # déclenchement manuel pour tester

permissions:
  contents: read

jobs:
  veille:
    # Envoi depuis ton Gmail → via smtp.gmail.com, joignable depuis
    # un runner GitHub hébergé. Pas de self-hosted ni de cron local nécessaire.
    # SMTP_PASS = mot de passe d'application Google (voir README).
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer Claude Code + nodemailer
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install nodemailer

      - name: Générer la veille (headless)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pour router via Bedrock/Vertex (résidence de données), voir README
          # et la doc Claude Code — vars d'env dédiées au lieu de la clé API.
        run: |
          claude -p "$(cat prompts/veille.md)" \
            --model claude-sonnet-4-6 \
            --allowedTools "WebSearch" \
            --output-format text \
            > veille.md
          echo "----- aperçu -----"
          head -n 20 veille.md

      - name: Envoyer par mail
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: bertrand.coizy@edenred.com
        run: node scripts/send-veille.mjs veille.md

      - name: Archiver la veille du jour
        uses: actions/upload-artifact@v4
        with:
          name: veille-${{ github.run_id }}
          path: veille.md
          retention-days: 14
